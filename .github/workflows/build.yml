name: Build uCLinux image

# Build the image for Wildcat and publish it as a release on tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      BR2_DL_DIR: ${{ github.workspace }}/br-dl # Buildroot download cache directory

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch the Buildroot submodule
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --depth 1 buildroot

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            which sed make binutils build-essential diffutils gcc g++ \
            bash patch gzip bzip2 perl tar cpio unzip rsync file bc \
            findutils wget libncurses-dev

      - name: Restore Buildroot download cache
        uses: actions/cache@v4
        with:
          path: ${{ env.BR2_DL_DIR }}
          key: br-dl-${{ runner.os }}-${{ hashFiles('configs/wildcat_defconfig') }}
          restore-keys: |
            br-dl-${{ runner.os }}-

      - name: Build the image
        run: make build

      - name: Inspect the output files
        run: |
          ls -lh output/
          file output/Image.bin

      - name: Upload image as artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: uclinux-wildcat-image
          path: output/Image.bin
          if-no-files-found: error

      - name: Attach image to GitHub Release (tag pushes)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: output/Image.bin
          generate_release_notes: true